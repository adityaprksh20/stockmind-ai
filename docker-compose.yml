# ============================================
# StockMind + JyotishMarket AI
# Docker Compose Configuration
# ============================================

version: '3.8'

services:
  # ---- Main Application ----
  stockmind-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockmind-jyotish-ai
    ports:
      - "8501:8501"
    
    # Load API keys from .env file
    env_file:
      - .env
    
    # Additional environment variables
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - PYTHONPATH=/app
    
    # Restart policy
    restart: unless-stopped
    
    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Mount volumes for persistence (optional)
    volumes:
      - app-data:/app/data

  # ---- Optional: Redis for caching ----
  # Uncomment if you want to add caching later
  # redis:
  #   image: redis:7-alpine
  #   container_name: stockmind-redis
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 256M

volumes:
  app-data:
    driver: local